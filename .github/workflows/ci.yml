name: CI
permissions:
  contents: read
  pull-requests: read
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Report backend dependency vulnerabilities
        working-directory: backend
        run: npm audit --omit=dev --json || true
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Lint backend
        working-directory: backend
        run: npm run lint
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Test backend
        working-directory: backend
        run: npm run test -- --run
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Report frontend dependency vulnerabilities
        working-directory: frontend
        run: npm audit --omit=dev --json || true
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Test frontend
        working-directory: frontend
        run: npm run test -- --ci --runInBand
