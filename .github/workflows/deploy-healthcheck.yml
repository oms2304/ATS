name: Post-Deploy Health Check

# Runs after code lands on main. Render (backend) and Vercel (frontend) auto-deploy
# on that same push, so this job waits for the rollout and then verifies both are
# live and healthy. It fails loudly if production does not come up, giving a clear
# signal on the commit that a deploy is broken.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Override these here if the production URLs change.
env:
  BACKEND_URL: https://ats-aeyy.onrender.com
  FRONTEND_URL: https://ats-delta-ten.vercel.app

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Give Render/Vercel time to start building
        run: sleep 60

      - name: Wait for backend /readyz to return 200
        run: |
          # Retries cover build time (~2-4 min) plus free-tier cold start (~50s).
          for i in $(seq 1 24); do
            code=$(curl -s -m 20 -o /dev/null -w '%{http_code}' "$BACKEND_URL/readyz" || true)
            echo "attempt $i: backend $BACKEND_URL/readyz -> $code"
            if [ "$code" = "200" ]; then
              echo "Backend healthy."
              exit 0
            fi
            sleep 20
          done
          echo "::error::Backend health check failed (never returned 200)."
          exit 1

      - name: Wait for frontend to return 200
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -m 20 -o /dev/null -w '%{http_code}' "$FRONTEND_URL/login" || true)
            echo "attempt $i: frontend $FRONTEND_URL/login -> $code"
            if [ "$code" = "200" ]; then
              echo "Frontend healthy."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Frontend health check failed (never returned 200)."
          exit 1

      - name: Smoke test - critical API behavior
        run: |
          # Verifies real app behavior beyond liveness: auth is enforced on
          # protected routes, and login rejects bad credentials with a clean
          # error rather than a 500. Demo-critical flow, no data created.
          jobs_code=$(curl -s -m 20 -o /dev/null -w '%{http_code}' "$BACKEND_URL/api/jobs")
          echo "GET /api/jobs (no auth) -> $jobs_code"
          if [ "$jobs_code" != "401" ]; then
            echo "::error::Expected 401 from unauthenticated /api/jobs, got $jobs_code"
            exit 1
          fi

          login_code=$(curl -s -m 20 -o /dev/null -w '%{http_code}' -X POST "$BACKEND_URL/api/auth/login" -H "Content-Type: application/json" -d '{"email":"smoketest-nonexistent@example.com","password":"wrong"}')
          echo "POST /api/auth/login (bad creds) -> $login_code"
          if [ "$login_code" != "401" ] && [ "$login_code" != "400" ]; then
            echo "::error::Expected 400/401 from bad login, got $login_code"
            exit 1
          fi

          echo "Smoke test passed: auth enforcement and login validation working."
