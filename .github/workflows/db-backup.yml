name: DB Backup

# Automated logical backup of the production Supabase database.
# Supabase's free tier has no managed backups or point-in-time recovery,
# so this workflow provides an off-site daily snapshot stored as a GitHub
# Actions artifact. Requires the `DIRECT_URL` repository secret (the Supabase
# session connection string, host ...pooler.supabase.com:5432).

on:
  schedule:
    - cron: '0 7 * * *' # daily at 07:00 UTC (~03:00 America/New_York)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "::error::DIRECT_URL secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          ts="$(date -u +%Y%m%d_%H%M%S)"
          file="ats_backup_${ts}.dump"
          echo "Creating custom-format dump: ${file}"
          pg_dump "$DIRECT_URL" --format=custom --no-owner --no-privileges --file "$file"
          ls -lh "$file"
          echo "BACKUP_FILE=${file}" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKUP_FILE }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30
          if-no-files-found: error
